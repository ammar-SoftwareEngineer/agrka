<div class="contact-bg-overlay"></div>
<div class="container position-relative">
  <div class="header-section text-center mb-5">
    <h2 class="mb-3 text-white" data-i18n="contact.title">اتصل بنا</h2>
    <h3 class="text-white" data-i18n="contact.heading">نحن هنا لمساعدتك</h3>
  </div>
  <div class="row g-4">
    <div class="col-lg-4 col-md-6">
      <div class="contact-info rounded-3 p-4 text-center text-white h-100">
        <div class="icon-circle mx-auto mb-2">
          <i class="fa-solid fa-envelope"></i>
        </div>
        <h6 class="mb-2" data-i18n="footer.email">البريد الإلكتروني</h6>
        <a href="mailto:info@agrka.com" class="text-white opacity-85">info@agrka.com</a>
      </div>
    </div>
    <div class="col-lg-4 col-md-6">
      <div class="contact-info rounded-3 p-4 text-center text-white h-100">
        <div class="icon-circle mx-auto mb-2">
          <i class="fa-solid fa-phone"></i>
        </div>
        <h6 class="mb-2" data-i18n="footer.phone">الهاتف</h6>
        <a href="tel:+201210609965" class="text-white opacity-85">+20 121 060 9965</a>
      </div>
    </div>
    <div class="col-lg-4 col-md-6">
      <div class="contact-info rounded-3 p-4 text-center text-white h-100">
        <div class="icon-circle mx-auto mb-2">
          <i class="fa-brands fa-whatsapp"></i>
        </div>
        <h6 class="mb-2">واتساب</h6>
        <a href="http://wa.me/+201210609965" target="_blank" class="text-white opacity-85">+20 121 060 9965</a>
      </div>
    </div>
  </div>
  <div class="row mt-5">
    <div class="col-lg-8 mx-auto">
      <form class="contact-form-wrapper rounded-3 p-4 p-md-5">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label text-white small" data-i18n="contact.name">الاسم</label>
            <input type="text" class="form-control" placeholder="" required />
          </div>
          <div class="col-md-6">
            <label class="form-label text-white small" data-i18n="contact.email">البريد الإلكتروني</label>
            <input type="email" class="form-control" placeholder="" required />
          </div>
          <div class="col-12">
            <label class="form-label text-white small" data-i18n="contact.phone">رقم الهاتف</label>
            <input type="tel" class="form-control" placeholder="" />
          </div>
          <div class="col-12">
            <label class="form-label text-white small" data-i18n="contact.message">الرسالة</label>
            <textarea class="form-control" rows="4" placeholder="" required></textarea>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-send px-4 py-2 rounded">
              <i class="fas fa-paper-plane me-2"></i>
              <span data-i18n="contact.send">إرسال</span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
