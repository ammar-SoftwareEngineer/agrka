<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/images/logo/logo.png" type="image/x-icon" />

    <!-- files css -->
    <link rel="stylesheet" href="./assets/css/all.min.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./assets/css/aos.css" />
    <link rel="stylesheet" href="./assets/css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/media.css" />
    <!-- google font  -->

    <title>تفاصيل الخدمة</title>
  </head>
  <body>
    <!-- 
  ##################################################
  #                   Loading                      #
  ##################################################
-->
    <div class="loading" id="loader"></div>
    <!-- 
  ##################################################
  #                   home                         #
  ##################################################
-->
    <header class="header" id="header"></header>

    <section
      id="service-detail-hero"
      class="hero-pages  position-relative d-flex align-items-end"
    >
   

      <div class="container py-5 text-center text-white hero-content z-3 position-relative sd-hero__inner">
        <h1
          id="service-hero-title"
          class="sd-hero__title fw-bold mb-4 "
          id="service-hero-title"
        ></h1>

        <nav class="sd-hero__breadcrumb" aria-label="breadcrumb">
          <ol
            class="breadcrumb d-flex flex-wrap justify-content-center gap-1 gap-sm-2 align-items-center text-white mb-0 "
            data-wow-delay="0.7s"
          >
            <li class="breadcrumb-item">
              <a href="index.html" class="text-white text-decoration-none" data-i18n="hero.home"></a>
            </li>
            <li class="text-white fs-5" aria-hidden="true">/</li>
            <li class="breadcrumb-item">
              <a href="services.html" class="text-white text-decoration-none" data-i18n="hero.breadcrumbServices"></a>
            </li>
            <li class="text-white fs-5" aria-hidden="true">/</li>
            <li
              class="breadcrumb-item fw-semibold active text-white fs-5"
              aria-current="page"
              data-i18n="hero.breadcrumbServiceDetails"
            ></li>
          </ol>
        </nav>
      </div>
    </section>
    <!-- 
  ##################################################
  #              Service detail                    #
  ##################################################
-->
    <section class="sd py-5 px-md-5">
      <div class="container-fluid px-md-5 px-3" id="details-container">
        <div class="row g-4 g-lg-0 align-items-stretch justify-content-center">
          <aside class="col-lg-4 col-xl-3 order-2 order-lg-1">
            <div class="sd-sidebar sticky-lg-top h-100 d-flex flex-column gap-3">
              <p class="sd-sidebar__eyebrow fw-bold text-uppercase mb-0 pb-2" data-i18n="servicesPage.detail.sidebarServicesTitle"></p>
              <nav class="sd-sidebar__nav" aria-label="Services">
                <ul class="list-unstyled sd-nav sd-nav--dark mb-0 d-flex flex-column" id="service-sidebar-list"></ul>
              </nav>

              <div class="sd-quote pt-3 border-top border-white border-opacity-10 flex-shrink-0">
                <p class="sd-quote__title fw-bold mb-3" data-i18n="servicesPage.detail.quoteTitle"></p>
                <form class="sd-quote__form" action="contact.html" method="get" novalidate>
                  <label class="visually-hidden" for="sd-quote-name" data-i18n="servicesPage.detail.quoteName"></label>
                  <input
                    id="sd-quote-name"
                    type="text"
                    name="name"
                    class="form-control sd-quote__input mb-2 rounded-0"
                    autocomplete="name"
                    data-i18n-placeholder="servicesPage.detail.quoteName"
                  />
                  <label class="visually-hidden" for="sd-quote-email" data-i18n="servicesPage.detail.quoteEmail"></label>
                  <input
                    id="sd-quote-email"
                    type="email"
                    name="email"
                    class="form-control sd-quote__input mb-2 rounded-0"
                    autocomplete="email"
                    data-i18n-placeholder="servicesPage.detail.quoteEmail"
                  />
                  <label class="visually-hidden" for="sd-quote-phone" data-i18n="servicesPage.detail.quotePhone"></label>
                  <input
                    id="sd-quote-phone"
                    type="tel"
                    name="phone"
                    class="form-control sd-quote__input mb-2 rounded-0 rtl-input"
                    autocomplete="tel"
                    data-i18n-placeholder="servicesPage.detail.quotePhone"
                  />
                  <button type="submit" class="btn-send w-100 fw-bold mt-2 rounded-0" data-i18n="servicesPage.detail.quoteSubmit"></button>
                </form>
              </div>

              <div class="sd-call text-center p-3 mt-auto flex-shrink-0 rounded-0">
                <div class="sd-call__icon d-flex align-items-center justify-content-center mx-auto mb-2 rounded-0" aria-hidden="true">
                  <i class="fas fa-phone"></i>
                </div>
                <p class="sd-call__title fw-bold text-uppercase small mb-1" data-i18n="servicesPage.detail.callUsTitle"></p>
                <p class="sd-call__hint small mb-2" data-i18n="servicesPage.detail.callUsHint"></p>
                <a href="tel:+201123734611" class="sd-call__phone fw-bold text-decoration-none" dir="ltr">+20 112 373 4611</a>
              </div>
            </div>
          </aside>

          <div class="col-lg-8 col-xl-9 order-1 order-lg-2">
            <div class="sd-main h-100">
              <div class="w-100">
                <img
                  id="detail-image"
                  src=""
                  alt=""
                  class="w-100 d-block object-fit-cover"
                  height="500px"
                  loading="lazy"
                />
              </div>
              <article id="service-detail-article" class="sd-article p-md-4 py-4">
                <header class="sd-article__header">
                  <h2 id="detail-title" class="sd-article__title fw-bold"></h2>
                  <div id="detail-description" class="sd-article__lead"></div>
                </header>

                <div id="detail-body" class="sd-article__body"></div>

                <section id="detail-highlights-wrap" class="sd-subblock sd-subblock--why d-none">
                  <h2 class="sd-subblock__title fw-bold" data-i18n="servicesPage.detail.highlightsTitle"></h2>
                  <div class="sd-subblock__content" id="detail-highlights-body"></div>
                </section>

                <section id="detail-scope-wrap" class="sd-subblock sd-subblock--muted d-none">
                  <h2 class="sd-subblock__title fw-bold" data-i18n="servicesPage.detail.scopeTitle"></h2>
                  <div class="sd-subblock__content" id="detail-scope-body"></div>
                </section>
              </article>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- 
  ##################################################
  #                  Footer                        #
  ##################################################
-->
    <footer id="footer" class="shadow"></footer>

    <!-- 
  ##################################################
  #                  SOCIAL ICONS                  #
  ##################################################
-->

    <div
      class="social-icon position-fixed bottom-0 d-flex flex-column gap-1 z-3 "
      data-wow-duration="1s"
    >
      <a
        href="tel:+201123734611"
        class="btn d-flex align-items-center justify-content-center"
        aria-label="Phone"
      >
        <i class="fas fa-phone"></i>
      </a>
      <a
        href="https://wa.me/201123734611"
        target="_blank"
        rel="noopener noreferrer"
        class="btn d-flex align-items-center justify-content-center"
        aria-label="WhatsApp"
      >
        <i class="fab fa-whatsapp"></i>
      </a>
      <!-- Back To Top start -->
    </div>
    <div class="back-to-top ">
      <a id="back-top" class><i class="fas fa-long-arrow-up"></i></a>
    </div>

    <!-- JS -->
    <script src="./assets/js/jquery-3.7.1.min.js"></script>
    <script src="./assets/js/data.js"></script>
    <script>
      window.addEventListener("translationsready", function () {
        renderDetails();
      });
    </script>

    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/swiper-bundle.min.js"></script>
    <script src="./assets/js/aos.js"></script>
    <script src="./assets/js/main.js"></script>
    <script>
      $("#header").load("app/header.html");
      $("#loader").load("app/loader.html");
      $("#footer").load("app/footer.html");
    </script>
  </body>
</html>
