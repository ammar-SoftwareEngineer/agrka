<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/images/logo.png"
      type="image/x-icon"
    />

    <!-- files css -->
    <link rel="stylesheet" href="./assets/css/all.min.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./assets/css/aos.css" />
    <link rel="stylesheet" href="./assets/css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/media.css" />
    <!-- google font  -->

    <title>Agrka</title>
  </head>

  <body>
    <!-- 
  ##################################################
  #                   Loading                      #
  ##################################################
-->
    <div class="loading" id="loader"></div>
    <!-- 
  ##################################################
  #                   home                         #
  ##################################################
-->
    <header class="header" id="header"></header>

    <section
    class="hero-pages position-relative d-flex align-items-end"
  
  >
  
    <div class="container py-5 text-center text-white hero-content z-3 position-relative sd-hero__inner">
      <h1
        class="sd-hero__title fw-bold mb-4 "
       data-i18n="hero.breadcrumbServices"
      ></h1>
  
      <nav aria-label="breadcrumb">
        <ol
          class="breadcrumb d-flex flex-wrap justify-content-center gap-1 gap-sm-2 align-items-center text-white mb-0 "
          data-wow-delay="0.7s"
        >
          <li class="breadcrumb-item">
            <a href="index.html" class="text-white text-decoration-none" data-i18n="hero.home"
              ></a
            >
          </li>
          <li class="text-white fs-5" aria-hidden="true">/</li>
          <li
            class="breadcrumb-item fw-semibold active text-white fs-5"
            aria-current="page"
          
          data-i18n="hero.breadcrumbServices"></li>
        </ol>
      </nav>
    </div>
  </section>
    <!-- 
  ##################################################
  #                   Services                     #
  ##################################################
-->
    <section class=" services-page px-md-5 py-5" >
      <div class="container-fluid px-md-5 px-3 py-5">
    
          <div class="row g-4" id="services-cards-row"></div>
   
      </div>
    </section>
    <!-- 
  ##################################################
  #                  Footer                        #
  ##################################################
-->
    <footer id="footer" class="shadow"></footer>

    <!-- 
  ##################################################
  #                  SOCIAL ICONS                  #
  ##################################################
-->

    <div
      class="social-icon position-fixed bottom-0 d-flex flex-column gap-1 z-3 wow fadeInRight"
      data-wow-duration="1s"
    >
      <a
        href="tel:+201123734611"
        class="btn d-flex align-items-center justify-content-center"
        aria-label="Phone"
      >
        <i class="fas fa-phone"></i>
      </a>
      <a
        href="https://wa.me/201123734611"
        target="_blank"
        rel="noopener noreferrer"
        class="btn d-flex align-items-center justify-content-center"
        aria-label="WhatsApp"
      >
        <i class="fab fa-whatsapp"></i>
      </a>
      <!-- Back To Top start -->
    </div>
    <div class="back-to-top wow fadeInRight">
      <a id="back-top" class>
        <i class="fas fa-long-arrow-up"></i>
      </a>
    </div>

    <!-- JS -->
    <script src="./assets/js/jquery-3.7.1.min.js"></script>
    <script src="./assets/js/data.js"></script>
    <script>
      window.addEventListener("translationsready", function () {
        renderServiceCards("services-cards-row", { variant: "division", delayStep: 80 });
      });
    </script>

<script src="./assets/js/bootstrap.bundle.min.js"></script>
<script src="./assets/js/swiper-bundle.min.js"></script>
<script src="./assets/js/aos.js"></script>
<script src="./assets/js/main.js"></script>


    <script>
      AOS.init({
        duration: 1000,
        easing: 'ease-in-out',
        delay: 100,
        offset: 100,
      });
      $("#header").load("app/header.html");
      $("#loader").load("app/loader.html");
      $("#footer").load("app/footer.html");

      $("#hero-pages").load("app/hero.html");
    </script>

  </body>
</html>
