<!DOCTYPE html>
<html lang="ar" >
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/images/logo/logo.png"
      type="image/x-icon"
    />

    <!-- files css -->
    <link rel="stylesheet" href="./assets/css/all.min.css" />
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./assets/css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./assets/css/aos.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/media.css" />

    <!-- google font  -->

    <title>أجريكا — حلول زراعية ذكية</title>
  </head>

  <body>
    <!-- 
  ##################################################
  #                   Loading                      #
  ##################################################
-->
    <div class="loading" id="loader"></div>
    <!-- 
  ##################################################
  #                   home                         #
  ##################################################
-->
    <header class="header" id="header"></header>

    <div class="hero d-md-block d-none " id="heroDesktop"></div>
    <div class="hero-mobile d-md-none d-block" id="heroMobile"></div>
    <!-- 
  ##################################################
  #                   About us                     #
  ##################################################
-->

    <section class="about-section py-5 px-md-5" id="about"></section>
    <!-- 
  ##################################################
  #                   Services                     #
  ##################################################
-->
    <section
      class="services-section py-5 px-md-5 "
      id="services"
    ></section>

    <!-- 
  ##################################################
  #                   Projects                     #
  ##################################################
-->
    <section
      class="projects-section py-5 px-md-5 "
      id="projects"
    ></section>
    <!-- 
  ##################################################
  #                    Blogs                       #
  ##################################################
-->
    <section class="blogs-section py-5 px-md-5 " id="blogs"></section>
    <!-- 
  ##################################################
  #                   Contact Us                   #
  ##################################################
-->
    <section
      class="contact-section py-5 px-md-5 "
      id="contact"
    ></section>
    <!-- 
  ##################################################
  #                  Footer                        #
  ##################################################
-->
    <footer id="footer" class="shadow-lg"></footer>

    <!-- 
##################################################
#                  SOCIAL ICONS                  #
##################################################
-->

    <div
      class="social-icon position-fixed bottom-0 d-flex flex-column gap-1 z-3 wow fadeInRight"
      data-wow-duration="1s"
    >
      <a
        href="tel:+201123734611"
        class="btn d-flex align-items-center justify-content-center"
        aria-label="اتصال"
      >
        <i class="fas fa-phone"></i>
      </a>
      <a
        href="https://wa.me/201123734611"
        target="_blank"
        rel="noopener noreferrer"
        class="btn d-flex align-items-center justify-content-center"
        aria-label="WhatsApp"
      >
        <i class="fab fa-whatsapp"></i>
      </a>
      <!-- Back To Top start -->
    </div>
    <div class="back-to-top wow fadeInRight">
      <a id="back-top" class>
        <i class="fas fa-long-arrow-up"></i>
      </a>
    </div>
    <!-- JS -->
    <script src="./assets/js/jquery-3.7.1.min.js"></script>
    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/swiper-bundle.min.js"></script>
    <script src="./assets/js/main.js"></script>
<script src="./assets/js/aos.js"></script>
    <script>
      $("#heroDesktop").load("home/hero-desktop.html");
      $("#heroMobile").load("home/hero-mobile.html");
      $("#about").load("home/about-section.html");
      $("#services").load("home/services-section.html");
      $("#projects").load("home/projects-section.html");
      $("#blogs").load("home/blogs-section.html");
      $("#contact").load("home/contact-section.html");
      $("#header").load("app/header.html");
      $("#footer").load("app/footer.html");
      $("#loader").load("app/loader.html");
AOS.init({
  duration: 1000,
  easing: 'ease-in-out',
  delay: 100,
  offset: 100,
});

    </script>

  </body>
</html>
